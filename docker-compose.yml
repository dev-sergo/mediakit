# Only Redis (the job queue) is containerised here. ComfyUI is an EXTERNAL
# service — it needs the host GPU, so run it separately on :8188 (see DOCS.md
# "Running"). The arq worker connects to both over the network.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
